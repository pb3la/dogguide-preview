<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dog Directory — Preview (Password Required)</title>
  <style>
    body{font-family:system-ui,Arial;margin:0}
    #auth-overlay{position:fixed;inset:0;background:#111a;display:flex;align-items:center;justify-content:center;z-index:9999}
    .auth-box{background:white;padding:24px;border-radius:8px;max-width:420px;width:100%;text-align:center}
    input{width:100%;padding:10px;margin-top:12px;border:1px solid #ddd;border-radius:6px}
    button{margin-top:12px;padding:10px 16px;border:none;background:#2c5f8d;color:#fff;border-radius:6px;cursor:pointer}
  </style>
</head>
<body>
<div id="auth-overlay">
  <div class="auth-box">
    <h2>Preview access — password required</h2>
    <p>Enter the preview password to continue.</p>
    <input id="pw" type="password" placeholder="Password">
    <button id="submit">Unlock preview</button>
    <p style="margin-top:10px;color:#666;font-size:13px">Ask Pete if you need the password.</p>
  </div>
</div>
<div id="site" style="display:none">
<!-- START SITE CONTENT -->
$(cat /root/.openclaw/.openclaw/workspace/preview_tmp/listing.html)
<!-- END SITE CONTENT -->
</div>
<script>
(function(){
  var PASSWORD='ReviewDog-2026!';
  var overlay=document.getElementById('auth-overlay');
  var site=document.getElementById('site');
  var input=document.getElementById('pw');
  var btn=document.getElementById('submit');
  btn.addEventListener('click',function(){
    if(input.value===PASSWORD){ overlay.style.display='none'; site.style.display='block'; } else { alert('Incorrect password'); }
  });
  input.addEventListener('keyup',function(e){ if(e.key==='Enter') btn.click(); });
})();
</script>
</body>
</html>
